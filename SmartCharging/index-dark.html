  lines.forEach(function(e) { gsap.set(e, { opacity: 0, scaleY: 0, transformOrigin: 'center top' }); });
  if (bolt) gsap.set(bolt, { opacity: 0, scale: 0, y: 15, transformOrigin: 'center center' });
  if (img) gsap.set(img, { opacity: 0, scale: 0.8, transformOrigin: 'center center' });

  tl.to(sc, { opacity: 1, visibility: 'visible', duration: 0.3 });
  if (img) tl.to(img, { opacity: 1, scale: 1, duration: 0.7, ease: 'back.out(1.4)' }, 0.15);
  tl.to(title, { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' }, 0.25);
  ell.forEach(function(e, i) {
    var op = parseFloat(e.getAttribute('opacity')) || 1;
    tl.to(e, { opacity: op, y: 0, duration: 0.7, ease: 'power2.out' }, 0.4 + i * 0.12);
  });
  lines.forEach(function(e, i) { tl.to(e, { opacity: 1, scaleY: 1, duration: 0.5, ease: 'power2.out' }, 0.5 + i * 0.05); });
  if (bolt) tl.to(bolt, { opacity: 1, scale: 1, y: 0, duration: 0.4, ease: 'back.out(2.5)' }, '>-0.3');
  tl.to({}, { duration: HOLD });
  tl.to(title, { opacity: 0, y: -20, duration: 0.35, ease: 'power2.in' });
  tl.to(lines, { opacity: 0, scaleY: 0, duration: 0.3, stagger: 0.02, ease: 'power2.in' }, '<');
  tl.to(ell, { opacity: 0, scale: 0.5, duration: 0.35, stagger: 0.04, ease: 'power2.in', transformOrigin: '349px 407px' }, '<');
  if (bolt) tl.to(bolt, { opacity: 0, scale: 0, duration: 0.25, ease: 'power2.in' }, '<');
  if (img) tl.to(img, { opacity: 0, scale: 0.85, duration: 0.35, ease: 'power2.in' }, '<');
  tl.set(sc, { opacity: 0, visibility: 'hidden' });
  return tl;
}

function s2() {
  var tl = gsap.timeline(), sc = '#scene-2', ch = dc(2);
  if (ch.length < 5) return tl;
  var ao = ch[1], ai = ch[2], tb = ch[3], tk = ch[4], tlab = ch[5];
  var sf = ch[6], ss = ch[7], st = ch[8], img = ch[9];

  gsap.set(sc, { opacity: 0, visibility: 'hidden' });
  [ao, ai].forEach(function(e) {
    if (!e) return;
    try { var l = e.getTotalLength(); gsap.set(e, { strokeDasharray: l, strokeDashoffset: l }); }
    catch(x) { gsap.set(e, { opacity: 0 }); }
  });
  [tb, tk, tlab].forEach(function(e) { if (e) gsap.set(e, { opacity: 0, x: 50 }); });
  [sf, ss].forEach(function(e) { if (e) gsap.set(e, { opacity: 0, y: -20 }); });
  if (st) gsap.set(st, { opacity: 0, y: -12 });
  if (img) gsap.set(img, { opacity: 0, x: -40, scale: 0.9, transformOrigin: 'center center' });

  tl.to(sc, { opacity: 1, visibility: 'visible', duration: 0.3 });
  if (img) tl.to(img, { opacity: 1, x: 0, scale: 1, duration: 0.7, ease: 'power3.out' }, 0.15);
  [ai, ao].forEach(function(e, i) {
    if (!e) return;
    try { e.getTotalLength(); tl.to(e, { strokeDashoffset: 0, duration: 0.9, ease: 'power2.inOut' }, 0.2 + i * 0.15); }
    catch(x) { tl.to(e, { opacity: parseFloat(e.getAttribute('opacity')) || 1, duration: 0.6 }, 0.2 + i * 0.15); }
  });
  var tels = [tb, tk, tlab].filter(Boolean);
  tl.to(tels, { opacity: 1, x: 0, duration: 0.5, stagger: 0.06, ease: 'back.out(1.3)' }, 0.35);
  var sels = [sf, ss].filter(Boolean);
  tl.to(sels, { opacity: 1, y: 0, duration: 0.45, stagger: 0.04, ease: 'power2.out' }, 0.5);
  if (st) tl.to(st, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 0.6);

  // ── TOGGLE: OFF → ON ──
  // Label fades out as knob slides over it
  if (tlab) tl.to(tlab, { opacity: 0, x: -8, duration: 0.2, ease: 'power2.in' }, '>0.2');
  // Knob slides right 44px
  if (tk) tl.to(tk, { x: 44, duration: 0.35, ease: 'power2.inOut' }, '<');
  // Track turns green
  if (tb) tl.to(tb, { attr: { fill: '#2FBF94', stroke: '#2FBF94' }, duration: 0.25, ease: 'power1.inOut' }, '<0.05');
  // Knob turns white
  if (tk) tl.to(tk, { attr: { fill: '#FFFFFF' }, duration: 0.25, ease: 'power1.inOut' }, '<');

  tl.to({}, { duration: HOLD });

  var all = [img, ao, ai].concat(tels).concat(sels).concat([st]).filter(Boolean);
  tl.to(all, { opacity: 0, y: -12, duration: 0.35, stagger: 0.02, ease: 'power2.in' });
  tl.set(sc, { opacity: 0, visibility: 'hidden' });
  return tl;
}

function s3() {
  var tl = gsap.timeline(), sc = '#scene-3', ch = dc(3);
  if (ch.length < 10) return tl;
  var c1 = ch.slice(2, 6), c2 = ch.slice(6, 11), c3 = ch.slice(11, 16), cb = ch.slice(16, 18);

  gsap.set(sc, { opacity: 0, visibility: 'hidden' });
  gsap.set(c2, { opacity: 0, y: -90, x: 80 });
  gsap.set(c1, { opacity: 0, y: -60, x: -60 });
  gsap.set(c3, { opacity: 0, y: 70, scale: 0.8, transformOrigin: 'center center' });
  gsap.set(cb, { opacity: 0, scale: 0, transformOrigin: 'center center' });

  tl.to(sc, { opacity: 1, visibility: 'visible', duration: 0.3 });
  c2.forEach(function(e, i) {
    var op = parseFloat(e.getAttribute('opacity')) || 1;
    tl.to(e, { opacity: Math.min(op, 0.8), y: 0, x: 0, duration: 0.65, ease: 'back.out(1)' }, 0.15 + i * 0.03);
  });
  c1.forEach(function(e, i) {
    var op = parseFloat(e.getAttribute('opacity')) || 1;
    tl.to(e, { opacity: op, y: 0, x: 0, duration: 0.65, ease: 'back.out(1)' }, 0.25 + i * 0.03);
  });
  c3.forEach(function(e, i) {
    tl.to(e, { opacity: 1, y: 0, scale: 1, duration: 0.65, ease: 'back.out(1.2)' }, 0.35 + i * 0.03);
  });
  tl.to(cb, { opacity: 1, scale: 1, duration: 0.3, stagger: 0.04, ease: 'back.out(2)' }, '>-0.2');
  if (c3[2]) tl.to(c3[2], { rotation: 8, transformOrigin: '50% 20%', duration: 0.06, yoyo: true, repeat: 5, ease: 'power1.inOut' }, '>-0.1');

  tl.to({}, { duration: HOLD });

  tl.to(c2, { opacity: 0, x: 100, y: -50, rotation: 25, duration: 0.4, stagger: 0.02, ease: 'power3.in' });
  tl.to(c1, { opacity: 0, x: -80, y: -35, rotation: -20, duration: 0.4, stagger: 0.02, ease: 'power3.in' }, '<');
  tl.to(c3.concat(cb), { opacity: 0, y: 50, scale: 0.85, duration: 0.35, stagger: 0.02, ease: 'power3.in' }, '<');
  tl.set(sc, { opacity: 0, visibility: 'hidden' });
  return tl;
}

function s4() {
  var tl = gsap.timeline(), sc = '#scene-4', ch = dc(4);
  if (ch.length < 10) return tl;
  var lc = ch.slice(2, 5), rc = ch.slice(5, 8);
  var rows = ch.slice(8, 15).filter(Boolean);
  var rb = ch.slice(15, 17).filter(Boolean), gb = ch.slice(17, 19).filter(Boolean);

  gsap.set(sc, { opacity: 0, visibility: 'hidden' });
  gsap.set(lc, { opacity: 0, x: -70 });
  gsap.set(rc, { opacity: 0, x: 70 });
  rows.forEach(function(e) { gsap.set(e, { opacity: 0, y: 10 }); });
  gsap.set(rb, { opacity: 0, scale: 0, transformOrigin: 'center center' });
  gsap.set(gb, { opacity: 0, scale: 0, transformOrigin: 'center center' });

  tl.to(sc, { opacity: 1, visibility: 'visible', duration: 0.3 });
  tl.to(lc, { opacity: 1, x: 0, duration: 0.6, stagger: 0.03, ease: 'back.out(1.1)' }, 0.15);
  tl.to(rc, { opacity: 1, x: 0, duration: 0.6, stagger: 0.03, ease: 'back.out(1.1)' }, 0.2);
  tl.to(rb, { opacity: 1, scale: 1, duration: 0.4, stagger: 0.05, ease: 'back.out(2.5)' }, 0.45);
  tl.to(gb, { opacity: 1, scale: 1, duration: 0.4, stagger: 0.05, ease: 'back.out(2.5)' }, 0.55);
  rows.forEach(function(e, i) {
    var op = parseFloat(e.getAttribute('opacity')) || 1;
    tl.to(e, { opacity: op, y: 0, duration: 0.35, ease: 'power2.out' }, 0.5 + i * 0.05);
  });

  tl.to({}, { duration: HOLD });

  tl.to(lc, { opacity: 0, x: -50, duration: 0.35, stagger: 0.02, ease: 'power2.in' });
  tl.to(rc, { opacity: 0, x: 50, duration: 0.35, stagger: 0.02, ease: 'power2.in' }, '<');
  tl.to(rows, { opacity: 0, y: 6, duration: 0.25, stagger: 0.02, ease: 'power2.in' }, '<');
  tl.to(rb.concat(gb), { opacity: 0, scale: 0.5, duration: 0.3, stagger: 0.02, ease: 'power2.in' }, '<');
  tl.set(sc, { opacity: 0, visibility: 'hidden' });
  return tl;
}

function s5() {
  var tl = gsap.timeline(), sc = '#scene-5', ch = dc(5);
  if (ch.length < 30) return tl;
  var bars = ch.slice(2, 29), mb = ch.slice(29, 31);
  var cb = ch.slice(31, 35).filter(Boolean), ind = ch.slice(35, 37).filter(Boolean);
  var face = ch.slice(37, 48).filter(Boolean), lab = ch.slice(48).filter(Boolean);

  gsap.set(sc, { opacity: 0, visibility: 'hidden' });
  bars.forEach(function(e) { gsap.set(e, { scaleY: 0, transformOrigin: 'center bottom' }); });
  gsap.set(mb, { opacity: 0, scale: 0.5, transformOrigin: '413px 247px' });
  cb.forEach(function(e) { gsap.set(e, { opacity: 0, scale: 0, transformOrigin: 'center center' }); });
  ind.forEach(function(e) { gsap.set(e, { opacity: 0, scale: 0, transformOrigin: 'center center' }); });
  face.forEach(function(e) { gsap.set(e, { opacity: 0, scale: 0.7, transformOrigin: 'center center' }); });
  lab.forEach(function(e) { gsap.set(e, { opacity: 0, y: 5 }); });

  tl.to(sc, { opacity: 1, visibility: 'visible', duration: 0.3 });
  tl.to(mb, { opacity: 1, scale: 1, duration: 0.65, stagger: 0.03, ease: 'back.out(1.2)' }, 0.15);
  tl.to(face, { opacity: 1, scale: 1, duration: 0.4, stagger: 0.025, ease: 'back.out(1.3)' }, 0.3);
  tl.to(cb, { opacity: 1, scale: 1, duration: 0.4, stagger: 0.08, ease: 'back.out(2)' }, 0.5);
  tl.to(bars, { scaleY: 1, duration: 0.4, stagger: { each: 0.02, from: 'start' }, ease: 'power2.out' }, 0.35);
  tl.to(ind, { opacity: 1, scale: 1, duration: 0.45, stagger: 0.08, ease: 'back.out(1.8)' }, '>-0.3');
  tl.to(lab, { opacity: 1, y: 0, duration: 0.3, stagger: 0.04, ease: 'power2.out' }, '>-0.3');
  tl.to({}, { duration: HOLD });
  tl.to(lab, { opacity: 0, y: -5, duration: 0.25, stagger: 0.015, ease: 'power2.in' });
  tl.to(bars, { scaleY: 0, duration: 0.35, stagger: { each: 0.015, from: 'end' }, ease: 'power2.in', transformOrigin: 'center bottom' }, '<');
  tl.to(cb, { opacity: 0, scale: 0.5, duration: 0.3, stagger: 0.03, ease: 'power2.in' }, '<');
  tl.to(face, { opacity: 0, duration: 0.25, stagger: 0.015, ease: 'power2.in' }, '<');
  tl.to(mb.concat(ind), { opacity: 0, scale: 0.6, duration: 0.35, stagger: 0.02, ease: 'power2.in' }, '<0.05');
  tl.set(sc, { opacity: 0, visibility: 'hidden' });
  return tl;
}

// Make SVGs fill viewport (cover, not contain)
document.querySelectorAll('#stage svg').forEach(function(svg) {
  svg.setAttribute('preserveAspectRatio', 'xMidYMid slice');
});

buildMaster();

</script>
